# Bolsa de trabajo · Dev Day 4 Women
# Cada entrada es una vacante. Campos:
#   title    : Puesto
#   company  : Texto de la empresa (p. ej. "Empresa aliada")
#   modality : Remoto | Híbrido | Presencial
#   location : Ciudad (opcional; vacío = sin ciudad)
#   category : slug para el filtro -> desarrollo | datos | diseno | ciberseguridad | cloud
#   level    : Jr | Mid | Sr
#   badge    : spons (Patrocinador del evento) | bpc (Best Place to Code, empresa aliada) | "" (ninguno)
#   summary  : Descripción corta
#   link     : URL externa para postular
#   posted   : Texto de antigüedad (p. ej. "Hace 2 días")
#   logo     : Ruta opcional al logo; vacío = placeholder con degradado de marca

