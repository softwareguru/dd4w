      - horario: "09:15 – 09:35"
        titulo: "IA como copiloto para investigar problemas difíciles en producción"
        ponente: "Loyda Florencia"
        tipo: "sesion"
        abstracto: |-
          Investigar un incidente crítico en producción es uno de los momentos más difíciles en la carrera de cualquier ingeniera: el sistema está fallando, la presión es alta y no sabes por dónde empezar. En esta charla comparto cómo uso la IA no para escribir código, sino para pensar: como copiloto de investigación bajo presión.

          A través de tres casos reales muestro un método replicable, independientemente del stack o del área de especialidad. Un crash de sistema sin causa aparente, donde la IA ayudó a descartar hipótesis sistemáticamente hasta encontrar la raíz del problema. Notificaciones que dejaron de llegar silenciosamente, donde cruzar datos con IA permitió formular la hipótesis correcta antes de tocar código. Y 31 falsas llamadas al 911 generadas por un sistema que técnicamente funcionaba, donde la IA fue copiloto para correlacionar datos de tres fuentes distintas hasta que los números contaron la historia completa.

          El resultado en los tres casos fue el mismo: diagnóstico preciso sin tocar producción. Te llevas un método concreto: cómo estructurar una investigación con IA, qué preguntas hacerle, cómo iterar y cuándo confiar en sus respuestas, aplicable desde el primer día en cualquier equipo.
      - horario: "09:35 – 09:55"
        titulo: "Inteligencia geoespacial en la era de la IA"
        ponente: "Martha Villanueva"
        tipo: "sesion"
        abstracto: |-
          En la era de la inteligencia artificial generativa, los modelos de lenguaje (LLM) han demostrado una capacidad asombrosa para razonar y crear. Sin embargo, cuando se trata de interactuar con el mundo físico, a menudo se enfrentan a un desafío crítico: la falta de contexto en tiempo real y las «alucinaciones» geográficas. ¿Cómo podemos asegurar que las respuestas de una IA estén verdaderamente conectadas con la realidad de nuestro entorno? La respuesta está en la inteligencia geoespacial.

          En esta charla exploraremos el concepto de grounding (anclaje de datos) utilizando la infraestructura de Google Maps. Analizaremos cómo conectar el poder cognitivo de la IA con la base de datos geográfica más grande y actualizada del planeta, y cómo este enfoque permite anclar las respuestas de los modelos a datos del mundo real —desde la ubicación exacta y los horarios de un negocio hasta condiciones dinámicas del entorno—, transformando consultas abstractas en soluciones precisas, confiables y con contexto local.

          Diseñada para desarrolladoras y entusiastas de la tecnología, esta sesión desmitificará la integración de APIs geoespaciales con modelos de IA. Las asistentes se llevarán una visión clara de cómo el grounding mitiga los errores de los LLM, abre nuevas posibilidades para el desarrollo de aplicaciones inteligentes y redefine la forma en que el software interactúa con nuestro espacio físico.
      - horario: "10:15 – 11:00"
        titulo: "Tu mayor ventaja no es técnica. Y la IA te va a ayudar a encontrarla."
        ponente: "Marian Suárez · Mobiik"
        etiqueta: "Workshop patrocinado"
        tipo: "workshop"
        abstracto: |-
          La inteligencia artificial está transformando la forma en que trabajamos, pero las habilidades que más impulsan una carrera profesional siguen siendo profundamente humanas. En este workshop descubrirás cómo fortalecer competencias como la comunicación, el feedback y la presencia ejecutiva: habilidades que rara vez se enseñan y que hoy son más valiosas que nunca.

          A través de ejercicios prácticos apoyados por IA, aprenderás a convertir esta tecnología en una aliada para practicar conversaciones desafiantes, ganar confianza y desarrollar capacidades que ninguna herramienta puede reemplazar.
      - horario: "11:00 – 11:20"
        titulo: "Networking break"
        tipo: "logistica"
      - horario: "11:20 – 12:05"
        titulo: "Spec Driven Development: liderando con claridad desde la especificación"
        ponente: "Joselyn Ramos · CONTPAQi"
        etiqueta: "Workshop patrocinado"
        tipo: "workshop"
        abstracto: |-
          ¿Cuántos proyectos hemos visto morir no por falta de talento, sino por falta de claridad desde el primer día? Hoy, con la inteligencia artificial acelerando cada decisión, ya no basta con saber programar rápido: hay que saber, con precisión, qué estamos construyendo y por qué. Esa claridad se ha convertido en la habilidad de liderazgo más poderosa que podemos tener.

          En esta sesión hablaremos de Spec Driven Development (SDD), una metodología que coloca la especificación en el corazón de la construcción de producto. No es un trámite ni un documento más: es una herramienta de poder que nos permite alinear equipos, decidir con intención y liderar con confianza incluso cuando todo alrededor es incertidumbre.
