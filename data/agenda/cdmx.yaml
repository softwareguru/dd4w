      - horario: "14:15 – 14:35"
        titulo: "De la información al conocimiento: minería de datos como herramienta para transformar realidades"
        ponente: "Doricela Gutiérrez"
        tipo: "sesion"
        abstracto: |-
          La minería de datos se ha consolidado como una herramienta estratégica para transformar volúmenes de información en conocimiento para la toma de decisiones. Esta charla presenta una reflexión sobre su potencial para atender problemáticas complejas en ámbitos como la educación, la salud y el bienestar, a partir de una trayectoria centrada en la ciencia de datos, la inteligencia artificial y los sistemas inteligentes.

          Recupera experiencias desarrolladas en proyectos de investigación transdisciplinarios, dentro del proyecto «Sistemas transdisciplinarios basados en minería de datos para la promoción de la salud y el bienestar». Desde el modelo KDD se aborda el proceso mediante el cual los datos son seleccionados, depurados, transformados, analizados e interpretados para identificar patrones, factores asociados y oportunidades de intervención. Más allá de la precisión de los algoritmos, se resalta la importancia de traducir los hallazgos en acciones comprensibles, pertinentes y responsables.

          La exposición mostrará cómo las técnicas de clasificación, agrupamiento y reglas de asociación pueden apoyar la identificación temprana de riesgos académicos, el análisis de condiciones relacionadas con la salud y la generación de evidencia para orientar estrategias de prevención y acompañamiento. Asimismo, se enfatizará que los datos representan trayectorias, necesidades y contextos de personas; por ello, su uso debe incorporar criterios de calidad, ética, privacidad, transparencia e interpretación interdisciplinaria.

          Como mujer en STEM, esta experiencia evidencia que la participación femenina en ingeniería y tecnología fortalece la construcción de soluciones más incluyentes y vinculadas con los retos sociales. La minería de datos no debe entenderse únicamente como un recurso técnico, sino como una herramienta para impulsar la investigación aplicada, formar nuevas generaciones y promover decisiones que contribuyan a mejorar la vida de las comunidades.
      - horario: "14:35 – 14:55"
        titulo: "MLOps vs DevOps: el siguiente paso en la evolución tech"
        ponente: "Daniela Cortés"
        tipo: "sesion"
        abstracto: |-
          DevOps no fue diseñado para modelos ni datos; MLOps extiende estas prácticas para sistemas basados en IA. El objetivo de esta charla es entender la transición hacia arquitecturas basadas en datos e inteligencia artificial, además de conocer el ciclo de vida de MLOps y sus diferencias con el DevOps tradicional.
