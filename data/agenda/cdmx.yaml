      - horario: "15:35 – 15:55"
        titulo: "Datos contra el olvido: cómo construí un mapa de organizaciones que documentan feminicidios en México con herramientas gratuitas"
        ponente: "Nydia Mejía"
        tipo: "sesion"
        abstracto: |-
          En México, decenas de organizaciones civiles documentan feminicidios de forma independiente. Su trabajo es fundamental —y casi invisible—. No existe una herramienta que reúna, en un solo lugar, quiénes son, dónde están, cómo trabajan y qué producen. Este proyecto nació para resolver eso.

          Como parte de un curso sobre datos contra feminicidios, construí un mapa interactivo que visualiza estas organizaciones a lo largo del territorio nacional. Pero el proceso me enseñó algo que no esperaba: mi noción inicial de «documentación» era demasiado estrecha. Empecé pensando solo en bases de datos y registros estadísticos. Al investigar, descubrí que documentar también es arte: minidocumentales, performances, murales, proyectos de memoria colectiva. Ampliar esa definición fue una decisión técnica, pero sobre todo una decisión feminista.

          El stack es deliberadamente accesible: Python, Pandas y Folium para construir el mapa; Google Colab como entorno de desarrollo; GitHub Pages para publicarlo de forma gratuita. Sin servidores, sin presupuesto, sin equipo. Solo una persona, herramientas open source y un problema que valía la pena resolver.

          En esta charla comparto el proceso completo: desde la limpieza de datos y la construcción del mapa interactivo hasta las decisiones metodológicas sobre qué incluir y por qué. También hablo de las limitaciones honestas del proyecto —el mapa está en construcción permanente— y de cómo la comunidad puede contribuir a completarlo.

          El mensaje central es simple: no necesitas infraestructura costosa ni un equipo grande para construir algo significativo. Necesitas identificar un problema real, las herramientas correctas y la claridad de que los datos nunca son neutrales.
      - horario: "15:55 – 16:15"
        titulo: "Cómo los modelos de crédito heredan sesgos históricos de género: Begini como caso de estudio en inclusión financiera"
        ponente: "Francys Lanza"
        tipo: "sesion"
        abstracto: |-
          En gran parte de América Latina, los modelos de riesgo de crédito siguen dependiendo de datos del buró: historial de pago, límites, moras y consultas. Eso significa que los sesgos históricos en la forma en que se ha otorgado crédito —por ejemplo, menores montos aprobados o menos productos ofrecidos a mujeres— quedan codificados en los datos que entrenan los modelos actuales. Evaluar el sesgo en estos modelos exige mirar más allá de la métrica de precisión y preguntarnos: ¿qué pasa con las personas, en especial con las mujeres, que quedan sistemáticamente subvaloradas por ese sistema?

          En ese contexto, Begini propone una alternativa: construir un score basado en datos psicométricos y de comportamiento, generando datos de carácter de primera mano a través de pruebas breves que miden rasgos como locus de control, impulsividad, confianza o gratificación diferida. Este enfoque permite evaluar cómo decide y se organiza una persona hoy, sin depender únicamente de cuánto crédito formal tuvo en el pasado; algo crucial para mujeres y otros grupos con historiales «delgados» por falta de oportunidades más que por falta de capacidad de pago.

          Además, las métricas psicométricas se generan bajo condiciones controladas y pueden auditarse y recalibrarse para evitar que penalicen de forma injustificada a un género o grupo específico, reduciendo la herencia de sesgos históricos. Al complementar el buró con este perfil de carácter, las entidades financieras pueden distinguir entre quienes tienen poco historial por exclusión previa y quienes muestran patrones de riesgo genuinamente problemáticos, abriendo espacio a decisiones de crédito más explicables, personalizadas y alineadas con una inclusión financiera más justa.
      - horario: "16:15 – 16:35"
        titulo: "Liderando con neurodivergencia: herramientas reales para mujeres en tecnología"
        ponente: "Ana Cifuentes"
        tipo: "sesion"
        abstracto: |-
          Navegar por el demandante mundo de la tecnología y el liderazgo de comunidades es un reto enorme. Pero ¿qué pasa cuando a las responsabilidades diarias de ser una mujer «godín» en el sector tech le sumamos el TDAH, el trastorno de ansiedad generalizada y la depresión? En esta charla nos quitaremos los filtros para hablar de la realidad de la neurodivergencia y la salud mental en nuestros espacios de trabajo.

          A través de mi experiencia personal liderando equipos y organizando iniciativas comunitarias, compartiré cómo se manifiestan realmente estos síntomas en el día a día corporativo, con el objetivo de ayudarte a identificarlos en ti misma o en tus colegas.

          Más allá de la teoría, exploraremos herramientas prácticas e insights reales que me han permitido no solo sobrellevar estos retos, sino seguir impulsando proyectos, organizando eventos y gestionando personas con empatía.

          Si alguna vez te has sentido abrumada intentando equilibrar tu mente, tu carrera y tus comunidades, este espacio es para ti.
      - horario: "16:35 – 16:50"
        titulo: "Networking break"
        tipo: "logistica"
      - horario: "16:50 – 17:10"
        titulo: "AI-Ready Data: por qué no hay IA sin una estrategia de datos"
        ponente: "Valery Calderón"
        tipo: "sesion"
        abstracto: |-
          Implementar IA sin una estrategia de datos es una receta para el fracaso. El famoso «garbage in, garbage out» sigue siendo el mayor obstáculo para la innovación. En esta sesión hablaremos sobre las estrategias para construir un ecosistema de datos AI-Ready.

          Veremos estrategias prácticas de gobernanza de datos para garantizar la disponibilidad, seguridad, consistencia y fiabilidad de la información, asegurando que tus modelos de IA operen sobre una base sólida y escalable, alineada con las exigencias del mercado actual.
      - horario: "17:10 – 17:30"
        titulo: "DETECTA: ¿me hackearon o me están manipulando? Aprende a investigar riesgos digitales en la era de la IA"
        ponente: "Amizaday Hernández"
        tipo: "sesion"
        abstracto: |-
          La inteligencia artificial está transformando la forma en que nos comunicamos, trabajamos y aprendemos, pero también está facilitando nuevas formas de fraude, manipulación y violencia digital. Hoy, un mensaje, un correo electrónico, una llamada o incluso una imagen generada con IA pueden parecer completamente legítimos.

          En este taller práctico aprenderás el método DETECTA, una metodología diseñada para analizar situaciones sospechosas, identificar señales de riesgo y tomar decisiones informadas cuando algo no parece estar bien en tus cuentas, dispositivos o redes sociales.

          A través de casos reales inspirados en situaciones cotidianas, exploraremos cómo diferenciar un posible hackeo de una manipulación digital, cómo reconocer ataques potenciados por inteligencia artificial y qué evidencias revisar antes de actuar. Además, realizaremos una revisión práctica de herramientas y configuraciones de seguridad disponibles en computadoras y dispositivos móviles para identificar accesos no autorizados, sesiones activas, permisos de aplicaciones y otros indicadores de riesgo.

          Al finalizar, las participantes contarán con un proceso claro para investigar incidentes digitales, fortalecer su seguridad personal y acompañar a otras personas en la protección de su identidad digital. Porque en la era de la IA, la mejor defensa no es el miedo: es aprender a detectar, analizar y actuar.
      - horario: "17:30 – 17:35"
        titulo: "Quemar las naves"
        ponente: "Sol Estrada"
        etiqueta: "Lightning talk"
        tipo: "sesion"
        abstracto: |-
          Hay momentos en los que la vida te invita —o te exige— volver a empezar: cambiar de carrera, de trabajo, de lugar, de personas. Hoy quiero compartirles lo que ha significado para mí «quemar las naves» y tener el valor de comenzar otra vez.
      - horario: "17:35 – 17:40"
        titulo: "La mejor decisión de mi carrera fue aprender a aprender: cómo Internet cambió mi vida y por qué hoy cualquiera puede construir el futuro que imagina"
        ponente: "Jaqueline Razo"
        etiqueta: "Lightning talk"
        tipo: "sesion"
        abstracto: |-
          A los 19 años dejé la universidad porque mi familia ya no podía seguir pagando mis estudios. En ese momento pensé que estaba perdiendo mi oportunidad de construir una carrera. En realidad, estaba descubriendo una nueva forma de aprender: la necesidad de apoyar a mi familia me hizo tomar un camino inusual.

          Aprendí programación desde cero en YouTube, trabajé como freelancer para clientes en Estados Unidos, obtuve certificaciones de Microsoft en Azure y Ciencia de Datos, regresé a la universidad costeando mis propios estudios y hoy lidero proyectos de transformación digital e inteligencia artificial en una empresa global.

          En esta charla compartiré por qué el aprendizaje continuo ha sido mucho más importante que cualquier título, cómo exponernos a nuevas oportunidades puede transformar nuestra trayectoria profesional y por qué la IA representa una nueva democratización del conocimiento para quienes estén dispuestas a aprender.

          Mi objetivo es que cada asistente salga convencida de que su punto de partida no determina su futuro. La tecnología evoluciona constantemente, pero la capacidad de aprender y atreverse a dar el siguiente paso sigue siendo la habilidad más poderosa de todas.
      - horario: "17:40 – 17:45"
        titulo: "IA generativa: impacto colaborativo y enfoque ético multidisciplinario"
        ponente: "Marisela Cadena"
        etiqueta: "Lightning talk"
        tipo: "sesion"
        abstracto: |-
          En esta breve charla hablaré de los beneficios de la IA generativa y de un posible enfoque para la implementación de estas nuevas herramientas. Cuando hablamos de ética e IA generativa en herramientas colaborativas, solemos culpar al «algoritmo» o a los «sesgos de los datos», como si la tecnología tuviera vida propia.

          Como desarrolladora, sé que la realidad es otra: la IA solo ejecuta lo que nosotras permitimos. Los problemas éticos y de desinformación no son accidentes; nacen de decisiones conscientes en el diseño y desarrollo de software, un ecosistema históricamente dominado por hombres cis con una perspectiva homogénea.

          En estos cinco minutos quiero bajar a la tierra el debate ético desde la realidad del código. Analizaremos por qué la IA no es la culpable de sus impactos negativos y por qué urge un enfoque multidisciplinario real, donde la presencia de mujeres técnicas sea el contrapeso necesario para cuestionar lo que hoy se da por sentado.
      - horario: "17:45 – 17:50"
        titulo: "No esperé a sentirme lista... aunque la verdad es que casi lo hago"
        ponente: "Paola Flores"
        etiqueta: "Lightning talk"
        tipo: "sesion"
        abstracto: |-
          En esta charla comparto cómo una pregunta tan simple como «¿y si sí aplicamos?» terminó cambiando mi forma de vivir la universidad.

          Todo comenzó cuando una amiga y yo decidimos postularnos a un curso de Electrónica Analógica sin sentirnos completamente preparadas. Lo que parecía una oportunidad más se convirtió en el inicio de un camino lleno de cursos, programas de mentoría, voluntariados, proyectos como ATMANIE y comunidades que transformaron no solo mi formación profesional, sino también la manera en la que veía mi lugar dentro de STEM.

          A través de una historia cercana y personal, reflexiono sobre el miedo a no sentirse suficiente, el valor de las personas que nos impulsan a crecer y cómo muchas veces las mejores oportunidades llegan antes de que nos sintamos listas para tomarlas.

          Más que una charla sobre convocatorias, es una invitación a dejar de esperar el momento perfecto para empezar. Porque, a veces, todo cambia cuando dejamos de preguntarnos si somos suficientes y simplemente nos atrevemos a decir: «¿y si sí aplicamos?».
      - horario: "17:50 – 17:55"
        titulo: "La IA no vino a reemplazarme, vino a quitarme el trabajo aburrido"
        ponente: "Gabriela Tejadilla"
        etiqueta: "Lightning talk"
        tipo: "sesion"
        abstracto: |-
          Durante mucho tiempo pensé que la inteligencia artificial me ayudaría a hacer mi trabajo más rápido. Y sí, lo hace. Pero después de usarla todos los días como Portfolio Manager y Scrum Master, descubrí que ese no era el mayor beneficio. Lo más valioso ha sido otra cosa: me ayuda a ordenar el caos.

          Muchas veces el reto no es hacer una presentación, escribir una historia de usuario o documentar un proceso. El reto es que te llega una solicitud enorme, con información incompleta, opiniones distintas, urgencia y expectativas de muchas personas, y no sabes por dónde empezar.

          La IA me ha quitado buena parte del trabajo operativo, repetitivo y mentalmente agotador que consumía mi energía: tiempo que antes invertía organizando información, estructurando entregables o dándole forma a ideas dispersas. Y al hacerlo, me permitió volver a enfocarme en lo que realmente genera valor: entender problemas, tomar decisiones, conectar ideas, pensar en estrategia y acompañar a las personas.

          En esta charla compartiré cómo incorporé la IA a mi día a día en el sector financiero, donde se requieren controles y mucha precisión en los reportes, para transformar ideas dispersas en planes, documentos y acciones concretas. Hablaré de casos reales donde pasé de invertir días o semanas en ciertos entregables a resolverlos en horas, pero también de los errores, las limitaciones y los retos que encontré en el camino.

          Mi conclusión es simple: la IA no vino a reemplazarnos. Vino a quitarnos parte del trabajo más repetitivo y pesado para devolvernos algo más valioso: tiempo. Tiempo para pensar, aprender y crear, pero también para vivir —tener hobbies, hacer ejercicio, descansar, cuidarnos—. Confío en que, bien usada, la IA puede regresarnos nuestra humanidad.
