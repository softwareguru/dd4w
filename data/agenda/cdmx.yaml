    sesiones:
      - horario: "14:15 – 14:55"
        titulo: "PoC en minutos… ¿y ahora qué? De prototipo a producto real con AI"
        ponente: "Viridiana Romero y Lilivette Cruz · Novartis"
        etiqueta: "Workshop técnico"
        tipo: "sesion"
      - horario: "15:35 – 16:15"
        titulo: "Guardrails de Bedrock: construye IA responsable que proteja a tus usuarias"
        ponente: "Fernanda Osorio"
        etiqueta: "Workshop técnico"
        tipo: "sesion"
        abstracto: |-
          Las herramientas de IA generativa están transformando cómo construimos software, pero ¿quién decide qué es «seguro»? En este taller, las participantes configurarán Amazon Bedrock Guardrails desde cero para prevenir sesgos de género, proteger datos sensibles (PII) y controlar respuestas dañinas.

          Veremos en tiempo real cómo un modelo sin protecciones puede generar respuestas problemáticas —y cómo nosotras, como desarrolladoras, tenemos el poder de definir los límites éticos de la IA que construimos.
      - horario: "16:15 – 16:35"
        titulo: "Cuando diseño y desarrollo hablan el mismo idioma. IA para escalar un Design System multimarca"
        ponente: "Antonieta Carrasco"
        etiqueta: "Charla"
        tipo: "sesion"
        abstracto: |-
          Esta no es una charla sobre Kiro. Tampoco es una charla sobre Figma. Es la historia de cómo descubrimos que el verdadero valor de un Design System no estaba en sus componentes, sino en convertirse en un lenguaje compartido entre diseño y desarrollo.
      - horario: "16:50 – 17:30"
        titulo: "Strategy: The hidden knowledge"
        ponente: "Sandra Márquez"
        etiqueta: "Workshop soft skills"
        tipo: "sesion"
        abstracto: |-
          Las mujeres en tecnología no solo necesitan talento: necesitan estrategia. Este taller traduce los valores de los más grandes estrategas de la historia, su mentalidad y cómo algunas mujeres excepcionales aprendieron a ganar no solo una batalla, sino la guerra entera. Guiado por los ejemplos de mujeres de su tiempo que, en escenarios de profunda desventaja, se abrieron paso en un mundo de hombres y navegaron etapas complejas de poder.

          Sus ejemplos son hoy más necesarios que nunca en situaciones reales de la industria tech: construir influencia, elegir batallas, negociar visibilidad, leer los sistemas de poder y liderar sin perder la identidad. Una sesión práctica sobre liderazgo técnico, estrategia de carrera y toma de decisiones que impactará tu visión de vida.
