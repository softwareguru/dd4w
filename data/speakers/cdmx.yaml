      Actualmente es desarrolladora frontend en El Puerto de Liverpool. Estudió la carrera de técnico en Informática y la licenciatura en Ciencias de la Informática en el IPN. Es egresada de la maestría en Ciencias de la Computación del Centro de Investigación en Computación del IPN.

  - name: "Martha Gabriela Tejadilla Jaime"
    role: "Program Manager"
    org: "Actinver"
    cat: "lightning"
    photo: "martha-tejadilla.jpg"
    linkedin: "https://www.linkedin.com/in/martha-gabriela-tejadilla-jaime-845921158/"
    bio: |-
      Licenciada en Administración especializada en finanzas, actualmente cursa la maestría en Gestión de la Innovación en INFOTEC. Cuenta con dos años de experiencia en la coordinación de proyectos y seis en la administración del área de viáticos y pasajes.

      Sus principales actividades son el análisis financiero, las estrategias de innovación, y la vigilancia y control del gasto.

  - name: "Martha Villanueva Sánchez"
    role: "Directora de Desarrollo de Negocios"
    org: "Bufete de Soluciones Integrales"
    cat: "charla"
    photo: "martha-villanueva.jpg"
    linkedin: "https://www.linkedin.com/in/marthavillanueva"
    bio: |-
      Martha C. Villanueva es especialista en inteligencia geoespacial, arquitectura de soluciones complejas y consultoría de tecnología de vanguardia. Con más de 25 años de experiencia, diseña e implementa flujos de trabajo de alta precisión que vinculan el cómputo en la nube con la analítica geoespacial mediante plataformas líderes como Google Cloud Platform, Google Earth Engine, Octave y CARTO.

      A lo largo de su carrera ha liderado proyectos estratégicos de seguridad y defensa, desarrollo urbano y catastro municipal a nivel regional. Su trayectoria incluye la dirección de programas avanzados de transferencia tecnológica y capacitación para equipos de ingeniería y tomadores de decisiones en más de 30 instituciones civiles, militares y académicas de Latinoamérica.

      Es licenciada en Arquitectura, cuenta con una maestría en Teledetección y un diplomado en Geomática y Tecnología Satelital por la Universidad Mayor de Chile.

  - name: "Mirna Vázquez"
    role: "Investigadora"
    org: "UNAM"
    cat: "comunidad"
    photo: "mirna-vazquez.jpg"
    bio: |-
      Mirna Vázquez Rosas Landa es investigadora en ecología microbiana, metagenómica y bioinformática. Su trabajo integra el análisis de datos, la ciencia abierta y la programación en R para estudiar microbiomas ambientales. También impulsa comunidades de aprendizaje para que más mujeres en STEM desarrollen confianza técnica.

  - name: "Nydia Mejía Zavala"
    role: "Data Annotator"
    org: "Motive"
    cat: "charla"
    photo: "nydia-mejia.jpg"
    linkedin: "https://www.linkedin.com/in/nydia-mejia-004485237"
    bio: |-
      Científica de datos en formación, actualmente cursa la licenciatura en Ciencia de Datos en UNITEC. Su trayectoria es interdisciplinaria: viene del mundo editorial, la literatura y el trabajo en organizaciones de la sociedad civil, lo que da a su mirada sobre los datos una dimensión humana y crítica que va más allá del código.

      Trabaja como Data Annotator en el sector tech, rol desde el cual ha desarrollado un interés creciente por los sesgos en los sistemas de inteligencia artificial y la necesidad de incorporar la perspectiva de género en cada etapa del trabajo con datos.

      Su mapa de organizaciones es su primer proyecto de visualización independiente y representa exactamente lo que la llevó a cambiar de carrera: la convicción de que las herramientas tecnológicas pueden —y deben— ponerse al servicio de causas que importan.

  - name: "Paola Karina Flores Martínez"
    role: "Estudiante"
    org: "Instituto Politécnico Nacional"
    cat: "lightning"
    photo: "paola-flores.jpg"
    linkedin: "https://www.linkedin.com/in/flores-martinez-paola-karina-a6019b3a9"
    bio: |-
      Estudiante de Ingeniería en Computación en el Instituto Politécnico Nacional. Se considera una persona curiosa y con muchas ganas de aprender. Disfruta involucrarse en proyectos, comunidades y experiencias que le permitan desarrollar nuevas habilidades, conocer personas y seguir creciendo tanto personal como profesionalmente.

      Actualmente sigue explorando las distintas áreas de la tecnología mientras construye el camino que quiere seguir como ingeniera.

  - name: "Sandra Márquez"
    role: "Founder & CEO"
    org: "TechBrander"
    cat: "taller"
    photo: "sandra-marquez.jpg"
    linkedin: "https://www.linkedin.com/in/sandramarquezr/"
    bio: |-
      Sandra Márquez diseña estrategias de employer branding para empresas de tecnología en Latinoamérica y Estados Unidos. Ha liderado el área para DoorDash, Zillow y otras compañías tech, enfocada en cómo atraen y retienen talento senior de ingeniería.

      Es fundadora de PopOut (arquitectura retail y experiencias de marca), SM Studio (consultoría fraccional de employer branding) y TechBrander (estrategia experiencial para el ecosistema tech). Es autora del framework DEBS™ para medir el ROI del employer brand en comunidades de desarrolladores.

      Más de una década dentro del marketing experiencial en México le da una lectura directa de qué mueve al talento en los equipos de ingeniería y qué los hace querer quedarse.

  - name: "Sol Estrada"
    role: "Consultora de Procesos"
    org: "GRDS"
    cat: "lightning"
    photo: "sol-estrada.jpg"
    linkedin: "https://www.linkedin.com/in/sol-estrada-914b8b350"
    bio: |-
      Ingeniera en sistemas computacionales, apasionada por crear espacios donde los equipos crezcan, aprendan y generen valor sostenible.

      Participa activamente en comunidades de mujeres en tecnología, impulsando espacios de aprendizaje, conexión y crecimiento colectivo.

      Hoy regresa a un proyecto muy personal: Mux Kulli, donde, como directora general, busca llevar la cultura del maíz a la Baja.

  - name: "Valery Calderón Briz"
    role: "Senior Data Engineer"
    org: "PyLadies CDMX"
    cat: "charla"
    photo: "valery-calderon.jpg"
    linkedin: "https://www.linkedin.com/in/valerybriz/"
    bio: |-
      Actualmente es ingeniera de datos senior en Mitek y cuenta con un máster en Análisis y Visualización de Big Data. Ha sido coorganizadora de PyLadies Madrid y PyLadies Ciudad de México, fundadora de la comunidad Python Guatemala, instructora en OpenWebinars y mentora de speakers en múltiples conferencias.

      Es speaker en eventos internacionales, entre ellos PyData Madrid 2024 (España), Campus Party Global 2020 (México), PyCon Canadá 2019, PyCon Latam 2019 (Puerto Vallarta, México), PyCon 2018 (Cleveland, EE. UU.) y PyCon España 2017 (Cáceres, España).

