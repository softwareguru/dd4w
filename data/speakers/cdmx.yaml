ponentes:
  - name: "Amizaday Hernández"
    role: "Instructora líder y docente"
    org: "Generation México"
    cat: "charla"
    photo: "amizaday-hernandez.jpg"
    linkedin: "https://www.linkedin.com/in/amy-hean/"
    bio: |-
      Amizaday Hernández Angulo (Amy Hean) es ingeniera en Software y Redes, instructora líder de IT Support y promotora de la inclusión digital. Ha colaborado en la formación de talento tecnológico a través de programas de soporte técnico, desarrollo de software y alfabetización digital para mujeres, jóvenes y personas adultas mayores.

      Actualmente cursa una maestría en Ciberseguridad y participa en iniciativas de defensa digital y protección de mujeres en entornos tecnológicos. Su experiencia combina educación, soporte técnico, desarrollo web y concientización sobre seguridad digital.

      Es fundadora de «Amy Hean entre amigos», un proyecto comunitario que acerca la tecnología a poblaciones con acceso limitado a oportunidades de formación. Su misión es utilizar la tecnología como una herramienta de autonomía, inclusión y empoderamiento social.

  - name: "Ana Guadalupe Cifuentes Sánchez"
    role: "Technical Account Manager"
    org: "Google"
    cat: "charla"
    photo: "ana-cifuentes.jpg"
    linkedin: "https://www.linkedin.com/in/ana-cifuentes-sanchez/"
    bio: |-
      Actualmente es Technical Account Manager en Google, con experiencia previa como Cloud Support y DevOps Engineer. A lo largo de su carrera se ha dedicado a la integración, automatización y monitoreo de servicios en distintas plataformas cloud.

      Su camino hacia la tecnología ha sido enriquecedor: originalmente estudió Ingeniería de Minas y Metalurgia, pero decidió dar un giro profesional hacia la tecnología apoyándose en el bootcamp de Laboratoria.

      Además de la parte técnica, le apasiona generar impacto social. Es fundadora de ChidasTech, un espacio dedicado a inspirar y motivar a niñas a acercarse al mundo STEM. También participa activamente en comunidades tecnológicas y ha colaborado en la organización de eventos como el Community Day de AWS y el KCD Guadalajara, buscando promover espacios que aumenten la participación femenina en el sector.

  - name: "Antonieta Carrasco"
    role: "Lead Product Designer"
    org: "Lottus Education"
    cat: "charla"
    photo: "antonieta-carrasco.jpg"
    linkedin: "https://www.linkedin.com/in/antonietacarrasco/"
    bio: |-
      Antonieta Carrasco es Lead Product Designer en Lottus Education, con más de diez años de experiencia creando productos digitales para medios, banca y educación. Ha liderado proyectos reconocidos como Nación321 de El Financiero | Bloomberg y desarrollado soluciones para BBVA México y startups tecnológicas.

      Concibe el diseño de producto como una herramienta estratégica para generar impacto real, alineando negocio, tecnología y personas.

      Actualmente es docente en Impact Click, donde imparte Diseño de Interfaz (UI) y acompaña a sus estudiantes a transformar ideas en experiencias digitales claras, funcionales y con intención estratégica.

  - name: "Berenice Lemus"
    role: "UX Researcher & Service Designer"
    org: "Más Voces en Diseño México"
    cat: "comunidad"
    photo: "berenice-lemus.jpg"
    linkedin: "https://www.linkedin.com/in/berenice-lemus/"
    bio: |-
      Diseñadora y estratega de experiencia de usuario con sólida trayectoria conectando las necesidades de las personas con los objetivos de negocio. Se especializa en investigación, estrategia de producto y la definición de flujos complejos, transformando la ambigüedad en soluciones digitales intuitivas, accesibles y éticas.

      Considera que el diseño exitoso nace de la empatía profunda, tanto con el usuario final como con los equipos multidisciplinarios que hacen posible la tecnología. Como líder de comunidad, cree firmemente en el poder de la colaboración y la mentoría.

  - name: "Daniela Cortés"
    role: "Tech Architecture Sr. Analyst"
    org: "Accenture"
    cat: "charla"
    photo: "daniela-cortes.jpg"
    linkedin: "https://www.linkedin.com/in/danielacortescas/"
    bio: |-
      Daniela Cortés Castillo es Tech Architecture Sr. Analyst con más de cuatro años de experiencia en el diseño, despliegue y operación de infraestructura en la nube y pipelines CI/CD. Especialista en Kubernetes y cloud, se enfoca en la automatización, la confiabilidad de sistemas y la optimización del rendimiento en entornos empresariales.

      Actualmente trabaja en la mejora de arquitecturas basadas en contenedores, la resolución de incidentes complejos en producción y la habilitación de buenas prácticas DevOps y DevSecOps, además de impulsar iniciativas internas de conocimiento y mentoría técnica.

  - name: "Doricela Gutiérrez Cruz"
    role: "Profesora de tiempo completo"
    org: "Universidad Autónoma del Estado de México"
    cat: "charla"
    photo: "doricela-gutierrez.jpg"
    linkedin: "https://www.linkedin.com/in/doricela-gutierrez-cruz-73ab57355"
    bio: |-
      La Dra. Doricela Gutiérrez Cruz es profesora investigadora de tiempo completo en el Centro Universitario UAEM Nezahualcóyotl de la Universidad Autónoma del Estado de México. Es ingeniera en Comunicaciones y Electrónica, maestra en Ciencias en Ingeniería de Sistemas y doctora en Ingeniería de Sistemas por el Instituto Politécnico Nacional.

      Su trabajo académico se orienta a la ciencia de datos, la minería de datos, la inteligencia artificial, el aprendizaje automático y los sistemas inteligentes, con aplicaciones en educación, salud, bienestar, movilidad, seguridad y desarrollo institucional. Ha dirigido y participado en proyectos de investigación transdisciplinarios, así como en publicaciones, capítulos de libro y ponencias nacionales e internacionales.

      Cuenta con el reconocimiento de Perfil Deseable PRODEP, Nota Laudatoria de la UAEMéx, y es integrante del Sistema Nacional de Investigadoras e Investigadores. Su labor también incluye la formación de recursos humanos, la coordinación académica y el impulso de proyectos que vinculan la tecnología con la solución de problemáticas sociales.

  - name: "Fernanda Osorio"
    role: "Cloud Engineer"
    org: "AWS"
    cat: "taller"
    photo: "fernanda-osorio.jpg"
    linkedin: "https://www.linkedin.com/in/fer-osorio-925604225"
    bio: |-
      Cloud Engineer en AWS y licenciada en Ciencias de la Computación por la Universidad Nacional Autónoma de México (UNAM). Es fundadora de Ixalli, una comunidad dedicada a empoderar a mujeres en tecnología que ha impactado a más de mil personas.

      Speaker internacional certificada por AWS, se ha presentado en AWS Summit, AI Summit y Google México; fue reconocida con el SHEro Award 2025 en Amazon por Builder Collaboration.

      Como creadora de contenido tech en @soy_ferosorio, alcanza más de 325 mil vistas mensuales compartiendo sobre cloud computing y su experiencia como mujer en tecnología. Fernanda construye en la intersección de la ingeniería cloud, la inteligencia artificial generativa y el femtech, impulsada por la convicción de que la mejor tecnología será construida por personas que entienden el problema de primera mano.

  - name: "Francys Lanza"
    role: "Data Scientist"
    org: "Begini"
    cat: "charla"
    photo: "francys-lanza.jpg"
    linkedin: "https://www.linkedin.com/in/francys-lanza-garc%C3%ADa-784865128/"
    bio: |-
      Lead Data Scientist y Machine Learning Engineer con más de siete años de experiencia en la industria fintech, con especialidad en riesgo crediticio, detección de fraude y desarrollo de sistemas de machine learning en producción. Ha trabajado en todo el ciclo de vida de los modelos de inteligencia artificial, desde la ingeniería de variables y el desarrollo de modelos hasta su despliegue, monitoreo, gobernanza y operación a gran escala.

      Más allá de la ejecución técnica, le interesa profundamente la adopción responsable de la inteligencia artificial y el potencial que tienen los datos y el machine learning para ampliar el acceso a servicios financieros. Gran parte de su trabajo e investigación se centra en la ética en IA, el sesgo algorítmico, la data alternativa, los sistemas de scoring y la intersección entre tecnología e inclusión financiera.

  - name: "Jaqueline Razo"
    role: "Directora de Proyectos de Transformación Digital"
    org: "Mars"
    cat: "lightning"
    photo: "jaqueline-razo.jpg"
    linkedin: "https://www.linkedin.com/in/jaquelinerazo"
    bio: |-
      Ingeniera computacional, directora en Mars México y fundadora de una consultora de desarrollo de software. Especializada en inteligencia artificial, analítica y transformación digital, ha liderado iniciativas globales de Data Engineering, Business Intelligence y AI.

      Cuenta con certificaciones de Microsoft en Azure y Ciencia de Datos, además de un diplomado en Alta Gerencia y Alto Desempeño por el Tecnológico de Monterrey. Ha vivido y colaborado con equipos internacionales en España, Turquía, Canadá y México.

      Su misión es demostrar que el aprendizaje continuo y la exposición a nuevas oportunidades pueden transformar una carrera, y que en la era de la inteligencia artificial, aprender a aprender sigue siendo la habilidad más valiosa.

  - name: "Irais Serrano"
    role: "Ingeniera Senior de Datos"
    org: "Improving"
    cat: "charla"
    photo: "irais-serrano.jpeg"
    bio: |-
      Irais Serrano es Ingeniera Senior de Datos en Improving, con más de ocho años de experiencia diseñando plataformas de datos nativas en la nube, sistemas de analítica impulsados por inteligencia artificial y soluciones de migración a escala empresarial en entornos de fintech, banca y SaaS.

      Está especializada en la modernización de arquitecturas de datos heredadas mediante el uso de Azure, AWS, Databricks, Python y SQL, desarrollando pipelines escalables de ETL/ELT.

      Cuenta con experiencia práctica en la integración de soluciones de inteligencia artificial y aprendizaje automático en entornos de producción, utilizando GPT-3.5 Turbo, Claude, TensorFlow y modelos de detección de anomalías para optimizar la generación de reportes, la eficiencia operativa y la toma de decisiones.

      Tiene una sólida trayectoria en sistemas de datos financieros, automatización en la nube, CI/CD, observabilidad, gobierno de datos y desarrollo de soluciones analíticas orientadas a ejecutivos mediante Sigma Computing, Power BI, Grafana, Elastic Stack y OpenSearch.

  - name: "Marian Suárez"
    role: "Chief Marketing Officer"
