<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ .Title }}</title>

{{- $description := .Params.description | default .Site.Params.description -}}
<meta name="description" content="{{ $description }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ $description }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

{{ with index .Site.Params.images 0 }}
<meta property="og:image" content="{{ . | absURL }}">
{{ end }}

<!-- Twitter Cards -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@{{ .Site.Params.twitter_user }}">
<meta name="twitter:title" content="{{ .Title }}">
<meta name="twitter:description" content="{{ $description }}">

{{ with index .Site.Params.images 0 }}
<meta name="twitter:image" content="{{ . | absURL }}">
{{ end }}


<link rel="preload" href="/preview/fonts/hanken-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/preview/fonts/bricolage-latin.woff2" as="font" type="font/woff2" crossorigin>

{{- $styles := resources.Get "scss/dd4w2026.scss" | toCSS | minify | fingerprint -}}
<link rel="stylesheet" href="{{ $styles.RelPermalink }}">

<link rel="shortcut icon" href="{{ `favicon.ico` | relURL }}" type="image/x-icon">
</head>
