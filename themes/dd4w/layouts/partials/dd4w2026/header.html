<!-- info data/header.yml-->

<header class="hdr">
    <div class="wrap nav">

        <a class="logo" href="/" aria-label="{{ .Site.Data.header.logo.alt }}">
            <img src="{{ .Site.Data.header.logo.image | relURL }}" alt="{{ .Site.Data.header.logo.alt }}" class="logo-img">
        </a>

        <nav id="mainNav" class="nav-links">

            {{ range .Site.Data.header.menu }}

                {{ if .children }}

                    <span class="nav-dd">

                        <a href="{{ .url | default "#" | relURL }}"
                           {{ if eq $.Params.nav_active .identifier }}aria-current="page"{{ end }}>
                            {{ .name }}
                            <span aria-hidden="true">▾</span>
                        </a>

                        <span class="nav-dd-menu">
                            {{ range .children }}
                                <a href="{{ .url | relURL }}">{{ .name }}</a>
                            {{ end }}
                        </span>

                    </span>

                {{ else }}

                    <a href="{{ .url | relURL }}"
                       {{ if eq $.Params.nav_active .identifier }}aria-current="page"{{ end }}>
                        {{ .name }}
                    </a>

                {{ end }}

            {{ end }}

        </nav>

        <span class="nav-spacer"></span>

        <span class="sede-btns desktop">
            {{ range .Site.Data.header.buttons }}
                <a class="{{ .class }}" href="{{ .url | relURL }}">
                    {{ .label }}
                </a>
            {{ end }}
        </span>

        <button class="menu-btn" id="menuBtn" aria-label="Abrir menú" aria-controls="mainNav" aria-expanded="false">
            ☰
        </button>

    </div>
</header>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const btn = document.getElementById("menuBtn");
    const nav = document.getElementById("mainNav");

    btn.addEventListener("click", () => {

        nav.classList.toggle("active");

        const expanded = nav.classList.contains("active");

        btn.setAttribute("aria-expanded", expanded);

        btn.innerHTML = expanded ? "✕" : "☰";

    });

});
</script>
