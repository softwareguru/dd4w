<script>
document.querySelectorAll('[data-carr]').forEach(function(c){var t=c.querySelector('.track');c.querySelectorAll('[data-dir]').forEach(function(b){b.addEventListener('click',function(){t.scrollBy({left:(b.dataset.dir==='next'?1:-1)*t.clientWidth*0.8,behavior:'smooth'});});});});
(function(){var ov=document.getElementById('sponsorModal');if(!ov)return;var open=function(){ov.classList.add('show');document.body.style.overflow='hidden';var f=ov.querySelector('input');if(f)f.focus();};var close=function(){ov.classList.remove('show');document.body.style.overflow='';};document.querySelectorAll('[data-open-modal="sponsorModal"]').forEach(function(b){b.addEventListener('click',open);});ov.querySelectorAll('[data-close-modal]').forEach(function(b){b.addEventListener('click',close);});ov.addEventListener('click',function(e){if(e.target===ov)close();});document.addEventListener('keydown',function(e){if(e.key==='Escape'&&ov.classList.contains('show'))close();});var form=document.getElementById('sponsorForm');if(form)form.addEventListener('submit',function(e){e.preventDefault();form.style.display='none';ov.querySelector('.ok').style.display='block';});})();
(function(){var bar=document.getElementById('stickybar');if(!bar)return;var on=function(){if(window.scrollY>760)bar.classList.add('show');else bar.classList.remove('show');};window.addEventListener('scroll',on);on();var x=bar.querySelector('.x');if(x)x.addEventListener('click',function(){bar.remove();window.removeEventListener('scroll',on);});})();
</script>
